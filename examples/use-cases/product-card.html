<main data-layer="card" class="card">
  <section class="copy">
    <p data-layer="label" class="label">Preview</p>
    <h1 data-layer="title" data-clickclick-fit data-clickclick-min-font-size="36">Template-driven social image</h1>
    <p data-layer="subtitle" class="subtitle">Swap text, colors, and layout details without rewriting HTML.</p>
    <p data-layer="cta" class="cta">Generate the image</p>
  </section>
  <section data-layer="panel" class="panel" aria-hidden="true">
    <div data-layer="badge" class="badge">PNG</div>
  </section>
</main>
