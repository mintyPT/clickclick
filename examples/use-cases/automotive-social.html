<main data-layer="post" class="post post-inventory">
  <section class="photo-frame hero-frame">
    <img data-layer="hero_image" alt="" />
  </section>

  <section class="photo-frame inset-frame">
    <img data-layer="inset_image" alt="" />
  </section>

  <header class="masthead">
    <p data-layer="brand" class="brand">Apex Auto Co.</p>
    <p data-layer="tagline" class="tagline">Sales + detailing studio</p>
  </header>

  <div class="mark" aria-hidden="true">
    <span></span>
    <span></span>
  </div>

  <p data-layer="kicker" class="kicker">Weekend inventory drop</p>
  <h1 data-layer="title">Certified sedans detailed before delivery</h1>
  <p data-layer="subtitle" class="subtitle">Book a walkaround, reserve online, and leave with a ceramic-safe maintenance plan.</p>

  <dl class="stat-grid">
    <div>
      <dt data-layer="stat_one_label">Starting at</dt>
      <dd data-layer="stat_one_value">$289/mo</dd>
    </div>
    <div>
      <dt data-layer="stat_two_label">Detail credit</dt>
      <dd data-layer="stat_two_value">$350</dd>
    </div>
  </dl>

  <p data-layer="cta" class="cta">Schedule a test drive</p>
  <p data-layer="url" class="url">apexauto.example</p>
</main>
