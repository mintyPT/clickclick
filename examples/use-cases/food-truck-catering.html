<main data-layer="post" class="post post-schedule">
  <img data-layer="hero_image" class="hero-image" alt="" />

  <header class="masthead">
    <p data-layer="brand" class="brand">Copper Cart</p>
    <p data-layer="tagline" class="tagline">Mobile kitchen and catering</p>
  </header>

  <section class="copy-panel">
    <p data-layer="eyebrow" class="eyebrow">This week</p>
    <h1 data-layer="title">Lunch route drop</h1>
    <p data-layer="subtitle" class="subtitle">Three stops, one brisket taco special, preorders open now.</p>
  </section>

  <section class="route-card">
    <p data-layer="route_label" class="route-label">Route</p>
    <p data-layer="route_one" class="route-line route-one">Mon - Foundry Yard</p>
    <p data-layer="route_two" class="route-line route-two">Wed - Arcade Park</p>
    <p data-layer="route_three" class="route-line route-three">Fri - Harbor Lawn</p>
  </section>

  <section class="offer-card">
    <p data-layer="offer_label" class="offer-label">Preorder</p>
    <p data-layer="offer_value" class="offer-value">$12 lunch box</p>
  </section>

  <p data-layer="cta" class="cta">Order by 10am at coppercart.example</p>
</main>
